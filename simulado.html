<script>
    // ==================== FUNÇÕES DE USUÁRIO ====================
    function obterUsuarioLogado() {
        const userData = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (!userData) return null;
        const usuarios = JSON.parse(localStorage.getItem('usuarios_sistema') || '[]');
        return usuarios.find(u => u.id === userData.id && u.ativo) || null;
    }

    function atualizarUsuario(novoUsuario) {
        let usuarios = JSON.parse(localStorage.getItem('usuarios_sistema'));
        const index = usuarios.findIndex(u => u.id === novoUsuario.id);
        if (index !== -1) {
            usuarios[index] = novoUsuario;
            localStorage.setItem('usuarios_sistema', JSON.stringify(usuarios));
            localStorage.setItem('usuarioLogado', JSON.stringify({
                id: novoUsuario.id,
                nome: novoUsuario.nome,
                email: novoUsuario.email,
                pontos: novoUsuario.pontos,
                downloadsRestantes: novoUsuario.downloadsRestantes
            }));
        }
    }

    // Redireciona se não estiver logado
    const usuario = obterUsuarioLogado();
    if (!usuario) {
        alert("Você precisa estar logado para acessar o simulado.");
        window.location.href = "../index.html"; // ajuste o caminho se necessário
    }

    // ==================== DADOS DO SIMULADO ====================
    function shuffleContent(optionsArray, correctIndex) {
        let content = optionsArray.slice();
        for (let i = content.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [content[i], content[j]] = [content[j], content[i]];
        }
        let newCorrect = content.indexOf(optionsArray[correctIndex]);
        return { options: content, correct: newCorrect };
    }

    const fixedQuestions = [ /* ... seu array fixo ... */ ]; // (mesmo do seu código)

    let questions = fixedQuestions.map(q => {
        let shuffled = shuffleContent(q.options, q.correct);
        return { text: q.text, options: shuffled.options, correct: shuffled.correct };
    });

    const topics = ["Regressão Logística","Árvores","SVM","Naive Bayes","K-NN","Ensembles","Validação Cruzada","Otimização","Métricas","K-means","Regras de Associação","t-SNE","Redes Neurais","BatchNorm","ReLU","Softmax","Backpropagation","TensorFlow","PyTorch","Distribuição Normal","Poisson","Autovalores","SVD","Normas","Intervalo de Confiança","Correlação","ANOVA","Bayes","ggplot2","Power BI","Storytelling","SQL","Normalização","Triggers","Views","ETL","OLAP","Geopandas","Scrum","PMBOK","Kanban","IA Generativa","LLM","Embeddings","LGPD","Ética","Data Warehouse","Star Schema","Data Lake","Lambda","Kappa","Airflow","Spark","Kafka","MongoDB","Redis","Cassandra","Prometheus","Grafana","ELK","AWS S3","BigQuery","REST","GraphQL","OAuth2","JWT","Docker","Terraform","Ansible","CI/CD","Jenkins"];

    for (let i = questions.length; i < 100; i++) {
        let tema = topics[i % topics.length];
        let texto, opcoesBase, corretaIndex;
        if (tema === "SVD") {
            texto = "A decomposição SVD resulta em:";
            opcoesBase = ["UΣVᵀ", "QΛQᵀ", "LU", "PLU", "QR"];
            corretaIndex = 0;
        } else if (tema === "ggplot2") {
            texto = "No ggplot2, comando para pontos:";
            opcoesBase = ["geom_bar()", "geom_point()", "geom_line()", "geom_histogram()", "geom_boxplot()"];
            corretaIndex = 1;
        } else if (tema === "Normalização") {
            texto = "A 3FN elimina:";
            opcoesBase = ["dependência parcial", "dependência transitiva", "grupos repetitivos", "tabelas temporárias", "chaves estrangeiras"];
            corretaIndex = 1;
        } else {
            texto = `Sobre ${tema}, assinale a alternativa correta:`;
            opcoesBase = [
                `Conceito incorreto sobre ${tema}`,
                `Definição precisa de ${tema} (correta)`,
                `Afirmação parcialmente verdadeira`,
                `Exemplo que não se aplica`,
                `Detalhe avançado e irrelevante`
            ];
            corretaIndex = 1;
        }
        let shuffled = shuffleContent(opcoesBase, corretaIndex);
        questions.push({ text: texto, options: shuffled.options, correct: shuffled.correct });
    }

    // ==================== ESTADO DO SIMULADO ====================
    let userAnswers = new Array(100).fill(null);
    let currentIndex = 0;
    let timerSeconds = 4 * 3600; // 4 horas
    let timerInterval;
    let submitted = false;

    // Chave única para este simulado (por usuário e área)
    const STORAGE_KEY = `simulado_cientista_${usuario.id}`;

    function carregarProgresso() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.answers && data.answers.length === 100) userAnswers = data.answers;
                if (data.timerSeconds) timerSeconds = data.timerSeconds;
                if (data.submitted) submitted = data.submitted;
                currentIndex = data.currentIndex || 0;
            } catch(e) {}
        }
        if (submitted) {
            clearInterval(timerInterval);
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').style.opacity = '0.6';
            exibirResultados(true); // apenas mostra o resultado já calculado
        }
    }

    function salvarProgresso() {
        if (!submitted) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                answers: userAnswers,
                timerSeconds: timerSeconds,
                currentIndex: currentIndex,
                submitted: false
            }));
        }
    }

    // ==================== RENDERIZAÇÃO ====================
    function formatTime(s) {
        let h = Math.floor(s / 3600);
        let m = Math.floor((s % 3600) / 60);
        let sec = s % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function updateTimer() {
        if (submitted) return;
        if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            alert("Tempo esgotado! O simulado será finalizado automaticamente.");
            submitSimulado();
        } else {
            timerSeconds--;
            document.getElementById('timerDisplay').innerText = formatTime(timerSeconds);
            salvarProgresso();
        }
    }

    function renderCurrentQuestion() {
        const q = questions[currentIndex];
        const ans = userAnswers[currentIndex];
        const letters = ['A', 'B', 'C', 'D', 'E'];
        const optsHtml = q.options.map((opt, idx) => `
            <li>
                <input type="radio" name="q${currentIndex}" value="${idx}" id="q${currentIndex}_${idx}" ${ans === idx ? 'checked' : ''}>
                <label for="q${currentIndex}_${idx}">${letters[idx]}) ${opt}</label>
            </li>
        `).join('');
        const panel = document.getElementById('questionsPanel');
        panel.innerHTML = `
            <div class="question-card">
                <div class="question-text">${currentIndex + 1}. ${q.text}</div>
                <ul class="options">${optsHtml}</ul>
            </div>
        `;
        // Adiciona eventos aos radios
        document.querySelectorAll(`input[name="q${currentIndex}"]`).forEach(radio => {
            radio.addEventListener('change', (e) => {
                userAnswers[currentIndex] = parseInt(e.target.value);
                atualizarNavegacao();
                atualizarBarraProgresso();
                salvarProgresso();
            });
        });
    }

    function atualizarNavegacao() {
        const botoes = document.querySelectorAll('.nav-btn');
        botoes.forEach((btn, idx) => {
            if (userAnswers[idx] !== null) btn.classList.add('answered');
            else btn.classList.remove('answered');
            if (idx === currentIndex) btn.classList.add('current');
            else btn.classList.remove('current');
        });
        atualizarBarraProgresso();
    }

    function renderNavGrid() {
        let html = '';
        for (let i = 0; i < 100; i++) {
            html += `<button class="nav-btn ${userAnswers[i] !== null ? 'answered' : ''}" data-idx="${i}">${i+1}</button>`;
        }
        document.getElementById('navGrid').innerHTML = html;
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentIndex = parseInt(btn.getAttribute('data-idx'));
                renderCurrentQuestion();
                atualizarNavegacao();
                salvarProgresso();
            });
        });
        atualizarNavegacao();
    }

    function atualizarBarraProgresso() {
        const respondidas = userAnswers.filter(a => a !== null).length;
        const percent = (respondidas / 100) * 100;
        document.getElementById('progressFill').style.width = `${percent}%`;
    }

    // ==================== FINALIZAÇÃO ====================
    async function submitSimulado() {
        if (submitted) return;
        clearInterval(timerInterval);
        submitted = true;

        let corretas = 0;
        for (let i = 0; i < 100; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) corretas++;
        }
        const percentual = (corretas / 100) * 100;

        // Atualiza pontos do usuário (ganha o percentual em pontos)
        const pontosGanhos = Math.floor(percentual);
        if (pontosGanhos > 0) {
            usuario.pontos = (usuario.pontos || 0) + pontosGanhos;
            atualizarUsuario(usuario);
        }

        // Salva que este simulado já foi finalizado (evita re-submissão)
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            answers: userAnswers,
            timerSeconds: timerSeconds,
            submitted: true,
            resultado: { corretas, percentual }
        }));

        exibirResultados(false, corretas, percentual);
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').style.opacity = '0.6';
    }

    function exibirResultados(apenasExibir, corretas = null, percentual = null) {
        if (!apenasExibir) {
            // cálculo já feito fora
        } else {
            // carregar do localStorage
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                corretas = data.resultado.corretas;
                percentual = data.resultado.percentual;
            } else {
                return;
            }
        }

        const resultsPanel = document.getElementById('resultsPanel');
        resultsPanel.style.display = 'block';
        let botoesAdicionais = '';

        if (percentual >= 70) {
            // Verifica se ainda tem downloads restantes
            if (usuario.downloadsRestantes > 0) {
                botoesAdicionais = `
                    <button id="downloadPdfBtn" style="background:#28a745; margin-top:1rem;">
                        <i class="fas fa-download"></i> Baixar E-book (restam ${usuario.downloadsRestantes} download(s))
                    </button>
                `;
            } else {
                botoesAdicionais = `<p style="color:#c0392b;">⚠️ Você atingiu 70%, mas não tem mais downloads disponíveis. Complete outros simulados para ganhar mais créditos.</p>`;
            }
        } else {
            botoesAdicionais = `<p style="color:#c0392b;">🔒 Atingiu ${percentual.toFixed(1)}% – mínimo 70% para baixar o PDF.</p>`;
        }

        resultsPanel.innerHTML = `
            <h3>Resultado Final</h3>
            <div class="score">${corretas}/100 (${percentual.toFixed(1)}%)</div>
            <p>Você respondeu ${userAnswers.filter(a => a !== null).length} questões.</p>
            <p>+${Math.floor(percentual)} pontos adicionados à sua conta.</p>
            ${botoesAdicionais}
            <button id="restartBtn" style="margin-top:1rem;"><i class="fas fa-sync-alt"></i> Refazer Simulado</button>
        `;

        document.getElementById('restartBtn')?.addEventListener('click', () => {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        });

        if (percentual >= 70 && usuario.downloadsRestantes > 0) {
            document.getElementById('downloadPdfBtn')?.addEventListener('click', () => {
                // Desconta 1 download
                if (usuario.downloadsRestantes > 0) {
                    usuario.downloadsRestantes--;
                    atualizarUsuario(usuario);
                    alert(`Download liberado! Agora você tem ${usuario.downloadsRestantes} download(s) restante(s).`);
                    window.open('ebook_cientista_dados.pdf', '_blank');
                } else {
                    alert("Você não possui mais downloads disponíveis.");
                }
            });
        }
    }

    // ==================== INICIALIZAÇÃO ====================
    function init() {
        carregarProgresso();
        renderNavGrid();
        renderCurrentQuestion();
        if (!submitted) {
            timerInterval = setInterval(updateTimer, 1000);
        } else {
            document.getElementById('timerDisplay').innerText = formatTime(timerSeconds);
        }
        document.getElementById('prevBtn').onclick = () => {
            if (currentIndex > 0 && !submitted) {
                currentIndex--;
                renderCurrentQuestion();
                atualizarNavegacao();
                salvarProgresso();
            }
        };
        document.getElementById('nextBtn').onclick = () => {
            if (currentIndex < 99 && !submitted) {
                currentIndex++;
                renderCurrentQuestion();
                atualizarNavegacao();
                salvarProgresso();
            }
        };
        document.getElementById('submitBtn').onclick = () => {
            if (submitted) return;
            if (confirm("Tem certeza que deseja finalizar o simulado?")) {
                submitSimulado();
            }
        };
        atualizarBarraProgresso();
    }

    init();
</script>
